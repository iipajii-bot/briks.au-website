<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <style>
      .display { font-family: 'Bricolage Grotesque', 'Times New Roman', serif; font-weight: 600; }
      .sans    { font-family: 'Inter Tight', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1080" height="1350" fill="#ffffff"/>
  <rect x="48" y="48" width="984" height="1254" fill="none" stroke="#e2ddd3" stroke-width="1"/>

  <text x="80" y="118" class="sans" font-size="20" fill="#8a6e3f" letter-spacing="6">ADELAIDE  ·  PLUMBER  ·  REF 8011</text>
